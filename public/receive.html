<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receive File | Fender</title>
    <!-- Add OG, meta, etc. from index.html -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="app-container">
      <h1>Receive Your File</h1>
      <input
        type="text"
        id="fileNameInput"
        placeholder="Paste file link or enter file name"
      />

      <div class="action-buttons">
        <button class="btn" onclick="receiveFile()">
          <i class="fas fa-file-import"></i> Get File
        </button>
        <button class="btn btn-info" onclick="pasteFileName()">
          <i class="fas fa-paste"></i> Paste Link
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='/'">
          <i class="fas fa-home"></i> Back
        </button>
      </div>

      <div
        id="statusMessage"
        class="status-message"
        style="display: none"
      ></div>
      <div id="filePreview" style="margin-top: 15px"></div>
      <!-- Content populated by JS -->
    </div>

    <script>
      function setStatus(message, type = "info") {
        const statusElement = document.getElementById("statusMessage");
        statusElement.textContent = message;
        statusElement.className = `status-message ${type}`;
        statusElement.style.display = message ? "block" : "none";
        if (type === "error") {
          document.getElementById("filePreview").innerHTML = ""; // Clear preview on error
        }
      }

      window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);
        const fileFromUrl = urlParams.get("file");
        if (fileFromUrl) {
          document.getElementById("fileNameInput").value =
            decodeURIComponent(fileFromUrl);
          setStatus(
            "File identifier loaded from link. Click 'Get File'.",
            "info"
          );
        }
      };

      function pasteFileName() {
        navigator.clipboard
          .readText()
          .then((text) => {
            document.getElementById("fileNameInput").value = text;
            setStatus("Content pasted. Click 'Get File'.", "info");
          })
          .catch((error) => {
            setStatus("Failed to paste: " + error, "error");
          });
      }

      function receiveFile() {
        let userInput = document.getElementById("fileNameInput").value.trim();
        if (!userInput) {
          setStatus("Please enter a file name or link", "error");
          return;
        }
        setStatus("Fetching file...", "info");
        document.getElementById("filePreview").innerHTML = ""; // Clear previous

        let actualFileName = userInput;
        try {
          // Try to parse as URL to extract filename if it's one of our links
          const url = new URL(userInput);
          if (
            (url.origin === window.location.origin ||
              url.protocol === "http:" ||
              url.protocol === "https:") &&
            url.pathname.endsWith("/receive") &&
            url.searchParams.has("file")
          ) {
            actualFileName = decodeURIComponent(url.searchParams.get("file"));
          }
        } catch (e) {
          /* Not our specific URL format, or not a URL at all; treat as filename */
        }

        if (!actualFileName) {
          setStatus("Invalid file identifier provided.", "error");
          return;
        }

        // Encode for the API call as it goes into the URL path
        fetch(`/api/files/share/${encodeURIComponent(actualFileName)}`)
          .then(async (response) => {
            if (!response.ok) {
              let errorMsg = `Error: ${response.status}`;
              try {
                const errorData = await response.json();
                errorMsg =
                  errorData.error ||
                  errorData.message ||
                  `File not found or server error. Status: ${response.status}`;
              } catch (e) {
                errorMsg =
                  response.statusText ||
                  `File not found or server error. Status: ${response.status}`;
              }
              throw new Error(errorMsg);
            }
            return response.json();
          })
          .then((data) => {
            if (data.url) {
              setStatus(
                "File found! Click link below to download/preview.",
                "success"
              );
              const filePreview = document.getElementById("filePreview");
              // Sanitize data.url just in case, though it's from our backend
              const safeUrl = data.url.startsWith("http") ? data.url : "#";
              const decodedFileNameForDisplay =
                decodeURIComponent(actualFileName); // Show original name nicely
              filePreview.innerHTML = `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-success" style="text-decoration:none; display:inline-block; margin-top:10px;"><i class="fas fa-download"></i> Download/Preview '${decodedFileNameForDisplay}'</a>`;
            } else {
              setStatus(
                data.message || "File not found (no URL provided).",
                "error"
              );
            }
          })
          .catch((error) => {
            console.error("Error receiving file:", error);
            setStatus(
              `${error.message || "Could not retrieve the file."}`,
              "error"
            );
          });
      }
    </script>
    <footer class="app-footer">
      <!-- Footer content from index.html -->
      <div class="footer-column">
        <p>Made by <strong>Satyam Malviya</strong></p>
        <a
          href="https://www.linkedin.com/in/satyam-malviya-377920260"
          target="_blank"
          ><img
            src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png"
            alt="LinkedIn"
        /></a>
      </div>
      
      <div class="footer-column">
        <p>and <strong>Mehul Kumar Chawra</strong></p>
        <a
          href="https://www.linkedin.com/in/mehul-chawra-69295a258"
          target="_blank"
          ><img
            src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png"
            alt="LinkedIn"
        /></a>
      </div>
    </footer>
  </body>
</html>
