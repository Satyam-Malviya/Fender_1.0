    <meta property="og:url" content="https://fender-app.com" />

    <meta
      name="description"
      content="Fender - A secure, cloud-based file-sharing system. Share and receive files with ease."
    />
    <meta

      content="file sharing, cloud storage, secure file sharing, Fender app"

    <title>Fender | Receive File</title>
    <!-- Combined title -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link

  <body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <!-- AdSense script (fender-ad-hori) REMOVED -->

    <div class="container">
      <h1>Receive Your File</h1>

      <input type="text" id="fileName" placeholder="Enter file name or link" />

      <button onclick="pasteFileName()">Paste</button>
      <button onclick="receiveFile()">Get File</button>
      <button onclick="window.location.href='/'">Back</button>

      <p id="statusMessage"></p>
      <div id="filePreview"></div>
    </div>

    <script>
      window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);
        const fileFromUrl = urlParams.get("file");
        if (fileFromUrl) {
          document.getElementById("fileName").value =
            decodeURIComponent(fileFromUrl);
        }
      };

      function pasteFileName() {
        navigator.clipboard
          .readText()
          .then((text) => {
            try {
              const url = new URL(text);
              if (url.pathname === "/receive" && url.searchParams.has("file")) {
                document.getElementById("fileName").value = decodeURIComponent(
                  url.searchParams.get("file")
                );
                return;
              }
            } catch (e) {
              // Not a valid URL or not our specific link format
            }
            document.getElementById("fileName").value = text;
          })
          .catch((error) => {
            alert("Failed to paste content: " + error);
          });
      }

      function receiveFile() {
        let fileNameInput = document.getElementById("fileName").value.trim(); // Trim whitespace
        if (!fileNameInput) {
          alert("Please enter a file name or link");
          return;
        }

        let actualFileName = fileNameInput;
        // Try to extract filename if a full Fender link is entered/pasted
        try {
          const url = new URL(fileNameInput); // This will throw if fileNameInput is not a valid absolute URL
          if (
            (url.origin === window.location.origin ||
              url.protocol === "http:" ||
              url.protocol === "https:") &&
            url.pathname.endsWith("/receive") &&
            url.searchParams.has("file")
          ) {
            actualFileName = decodeURIComponent(url.searchParams.get("file"));
          }
        } catch (e) {
          // It's not an absolute URL or not our link format, assume it's a direct filename
        }

        if (!actualFileName) {
          // After potential parsing, check if filename is empty
          alert("Invalid file identifier provided.");
          return;
        }

        document.getElementById("statusMessage").innerText = "Fetching file...";
        document.getElementById("filePreview").innerHTML = "";

        fetch(`/api/files/share/${encodeURIComponent(actualFileName)}`, {
          method: "GET",
        })
          .then(async (response) => {
            if (!response.ok) {
              let errorMsg = `Error: ${response.status}`;
              try {
                const errorData = await response.json();
                errorMsg =
                  errorData.error ||
                  errorData.message ||
                  `File not found or server error. Status: ${response.status}`;
              } catch (e) {
                // Failed to parse JSON, use status text or default
                errorMsg =
                  response.statusText ||
                  `File not found or server error. Status: ${response.status}`;
              }
              throw new Error(errorMsg);
            }
            return response.json();
          })
          .then((data) => {
            if (data.url) {
              document.getElementById("statusMessage").innerText =
                "File found! Click the link below.";
              const filePreview = document.getElementById("filePreview");
              filePreview.innerHTML = `<a href="${data.url}" target="_blank" rel="noopener noreferrer">Click here to preview or download '${actualFileName}'</a>`;
            } else {
              document.getElementById("statusMessage").innerText =
                data.message || "File not found (no URL provided).";
            }
          })
          .catch((error) => {
            console.error("Error receiving file:", error);
            document.getElementById("statusMessage").innerText = `${
              error.message || "Could not retrieve the file."
            }`;
          });
      }
    </script>
