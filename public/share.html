<!DOCTYPE html>
<html lang="en">
  <head>
    <meta
      property="og:title"
      content="Fender - Cloud-Based File Sharing System"
    />
    <meta
      property="og:description"
      content="Securely share and receive files with ease using Fender. Powered by AWS."
    />
    <meta property="og:image" content="https://fender-app.com/logo.png" />
    <meta property="og:url" content="https://fender-app.com" />
    <meta property="og:type" content="website" />

    <meta
      name="description"
      content="Fender - A secure, cloud-based file-sharing system. Share and receive files with ease."
    />
    <meta
      name="keywords"
      content="file sharing, cloud storage, secure file sharing, Fender app"
    />
    <meta name="author" content="Satyam Malviya, Mehul Kumar Chawra" />
    <meta name="robots" content="index, follow" />
    <title>Fender | Share File</title>
    <!-- Combined title -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <!-- AdSense script (fender-ad-hori) REMOVED -->

    <div class="container">
      <!-- AdSense Autorelaxed Ad block REMOVED -->

      <h1>Share Your File</h1>
      <input type="file" id="fileUpload" />
      <button onclick="uploadFile()">Upload</button>
      <button onclick="window.location.href='/'">Back</button>
      <p id="statusMessage"></p>

      <div
        id="progressContainer"
        style="display: none; width: 100%; background-color: #f3f3f3"
      >
        <div
          id="progressBar"
          style="height: 20px; background-color: #4caf50; width: 0%"
        ></div>
      </div>

      <div id="fileDetails" style="display: none">
        <p>Share this link with the receiver:</p>
        <textarea
          id="shareableLink"
          rows="3"
          readonly
          style="
            width: 100%;
            margin-top: 5px;
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            resize: none;
          "
        ></textarea>
        <button id="copyButton" onclick="copyShareableLink()">Copy Link</button>
      </div>
    </div>

    <script>
      function uploadFile() {
        const fileInput = document.getElementById("fileUpload");
        const file = fileInput.files[0];
        if (!file) {
          alert("Please choose a file to upload");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);

        document.getElementById("progressContainer").style.display = "block";
        document.getElementById("fileDetails").style.display = "none";
        const progressBar = document.getElementById("progressBar");

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/files/upload", true);

        xhr.upload.addEventListener("progress", function (e) {
          if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            progressBar.style.width = percent + "%";
          }
        });

        xhr.onload = function () {
          if (xhr.status === 200) {
            const response = JSON.parse(xhr.responseText);
            if (response.fileName) {
              document.getElementById("statusMessage").innerText =
                "File uploaded successfully!";

              const shareLink = `${
                window.location.origin
              }/receive?file=${encodeURIComponent(response.fileName)}`;

              const fileDetails = document.getElementById("fileDetails");
              fileDetails.style.display = "block";

              const shareableLinkTextarea =
                document.getElementById("shareableLink");
              shareableLinkTextarea.value = shareLink;
            } else {
              document.getElementById("statusMessage").innerText =
                "Failed to upload the file. Server did not return filename.";
            }
          } else {
            document.getElementById("statusMessage").innerText =
              "Error uploading the file. Status: " + xhr.status;
          }
          document.getElementById("progressContainer").style.display = "none";
          progressBar.style.width = "0%";
        };

        xhr.onerror = function () {
          document.getElementById("statusMessage").innerText =
            "Network error occurred while uploading the file.";
          document.getElementById("progressContainer").style.display = "none";
          progressBar.style.width = "0%";
        };

        xhr.send(formData);
      }

      function copyShareableLink() {
        const linkTextarea = document.getElementById("shareableLink");
        linkTextarea.select();
        linkTextarea.setSelectionRange(0, 99999);

        try {
          const successful = document.execCommand("copy");
          const msg = successful
            ? "Link copied to clipboard!"
            : "Failed to copy the link.";
          alert(msg);
        } catch (err) {
          alert("Oops, unable to copy the link. Please copy it manually.");
        }
      }
    </script>

        bottom: 0;
