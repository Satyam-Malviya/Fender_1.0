<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share File | Fender</title>
    
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="app-container">
      <h1>Share Your File</h1>
      <input type="file" id="fileUpload" />

      <div class="action-buttons">
        <button class="btn" onclick="uploadFile()">
          <i class="fas fa-cloud-upload-alt"></i> Upload
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='/'">
          <i class="fas fa-home"></i> Back
        </button>
      </div>

      <div
        id="statusMessage"
        class="status-message"
        style="display: none"
      ></div>
      

      <div
        id="progressContainer"
        style="display: none"
        class="progress-bar-container"
      >
        <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
      </div>

      <div id="fileDetails" style="display: none" class="file-details-box">
        <p>Share this link with the receiver:</p>
        <textarea id="shareableLink" rows="3" readonly></textarea>
        <button
          id="copyButton"
          class="btn btn-success"
          onclick="copyShareableLink()"
          style="margin-top: 10px; width: 100%"
        >
          <i class="fas fa-copy"></i> Copy Link
        </button>
      </div>
    </div>

    <script>
      function setStatus(message, type = "info") {
        // type can be 'success', 'error', 'info'
        const statusElement = document.getElementById("statusMessage");
        statusElement.textContent = message;
        statusElement.className = `status-message ${type}`; // Reset classes
        statusElement.style.display = message ? "block" : "none";
      }

      function uploadFile() {
        const fileInput = document.getElementById("fileUpload");
        const file = fileInput.files[0];
        if (!file) {
          setStatus("Please choose a file to upload", "error");
          return;
        }
        setStatus("Uploading...", "info");
        document.getElementById("progressContainer").style.display = "block";
        document.getElementById("fileDetails").style.display = "none";
        const progressBar = document.getElementById("progressBar");
        progressBar.style.width = "0%";
        progressBar.textContent = "0%";

        const formData = new FormData();
        formData.append("file", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/files/upload", true);

        xhr.upload.addEventListener("progress", function (e) {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + "%";
            progressBar.textContent = percent + "%";
          }
        });

        xhr.onload = function () {
          document.getElementById("progressContainer").style.display = "none";
          if (xhr.status === 200) {
            const response = JSON.parse(xhr.responseText);
            if (response.fileName) {
              setStatus("File uploaded successfully!", "success");
              const shareLink = `${
                window.location.origin
              }/receive?file=${encodeURIComponent(response.fileName)}`;
              const fileDetails = document.getElementById("fileDetails");
              fileDetails.style.display = "block";
              document.getElementById("shareableLink").value = shareLink;
            } else {
              setStatus(
                response.error ||
                  "Failed to upload the file. Server did not return filename.",
                "error"
              );
            }
          } else {
            try {
              const errorResponse = JSON.parse(xhr.responseText);
              setStatus(
                errorResponse.error || `Error uploading. Status: ${xhr.status}`,
                "error"
              );
            } catch (e) {
              setStatus(
                `Error uploading the file. Status: ${xhr.status}`,
                "error"
              );
            }
          }
        };

        xhr.onerror = function () {
          document.getElementById("progressContainer").style.display = "none";
          setStatus(
            "Network error occurred while uploading the file.",
            "error"
          );
        };
        xhr.send(formData);
      }

      function copyShareableLink() {
        const linkTextarea = document.getElementById("shareableLink");
        linkTextarea.select();
        linkTextarea.setSelectionRange(0, 99999);
        try {
          const successful = document.execCommand("copy");
          const msg = successful
            ? "Link copied to clipboard!"
            : "Failed to copy the link.";
          setStatus(msg, successful ? "success" : "error");
        } catch (err) {
          setStatus("Oops, unable to copy. Please copy manually.", "error");
        }
      }
    </script>
    <footer class="app-footer">
      
      <div class="footer-column">
        <p>Made by <strong>Satyam Malviya</strong></p>
        <a
          href="https://www.linkedin.com/in/satyam-malviya-377920260"
          target="_blank"
          ><img
            src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png"
            alt="LinkedIn"
        /></a>
      </div>
      
      <div class="footer-column">
        <p>and <strong>Khushi Rathore</strong></p>
        <a
          href="https://www.linkedin.com/in/khushi-rathore-1841a4253"
          target="_blank"
          ><img
            src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png"
            alt="LinkedIn"
        /></a>
      </div>
    </footer>
  </body>
</html>
